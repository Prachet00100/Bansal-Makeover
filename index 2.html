/* ===== mini area chart (replaces recharts) ===== */
function MiniChart({ data }) {
  const w = 640, h = 200, pad = 26, n = data.length;
  const max = Math.max(1, ...data.map((d) => d.count));
  const X = (i) => pad + (i * (w - pad * 2)) / (n - 1);
  const Y = (v) => h - pad - (v / max) * (h - pad * 2);
  const line = data.map((d, i) => (i ? "L" : "M") + X(i).toFixed(1) + " " + Y(d.count).toFixed(1)).join(" ");
  const area = line + " L" + X(n - 1).toFixed(1) + " " + (h - pad) + " L" + X(0).toFixed(1) + " " + (h - pad) + " Z";
  return (
    <svg viewBox={"0 0 " + w + " " + h} width="100%" height="100%" preserveAspectRatio="none">
      <defs><linearGradient id="bmg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#e0c188" stopOpacity="0.45" /><stop offset="100%" stopColor="#e0c188" stopOpacity="0" /></linearGradient></defs>
      <path d={area} fill="url(#bmg)" />
      <path d={line} fill="none" stroke="#e0c188" strokeWidth="2" />
      {data.map((d, i) => <circle key={i} cx={X(i)} cy={Y(d.count)} r="3" fill="#e0c188" />)}
      {data.map((d, i) => <text key={"t" + i} x={X(i)} y={h - 6} fill="#cdbfa8" fontSize="11" textAnchor="middle" fontFamily="Jost">{d.day}</text>)}
    </svg>
  );
}

function mergeDefaults(stored) {
  const dd = defaultData(); stored = stored || {};
  return {
    ...dd, ...stored,
    settings: { ...dd.settings, ...(stored.settings || {}) },
    content: { ...dd.content, ...(stored.content || {}) },
    media: { ...dd.media, ...(stored.media || {}) },
    appointments: [],
  };
}
async function loadContent() {
  try {
    const { data, error } = await db.from("site_content").select("data").eq("id", 1).single();
    if (error) return mergeDefaults(null);
    return mergeDefaults(data ? data.data : null);
  } catch { return mergeDefaults(null); }
}
async function saveContent(d) {
  const { appointments, ...rest } = d;
  try { await db.from("site_content").update({ data: rest }).eq("id", 1); } catch (e) { console.error(e); }
}
async function fetchAppointments() {
  try {
    const { data } = await db.from("appointments").select("*").order("created_at", { ascending: false });
    return (data || []).map((a) => ({ ...a, createdAt: a.created_at ? new Date(a.created_at).getTime() : Date.now() }));
  } catch { return []; }
}
function compressToBlob(file, max = 1280, q = 0.74) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h && w > max) { h = Math.round(h * max / w); w = max; }
        else if (h >= w && h > max) { w = Math.round(w * max / h); h = max; }
        const c = document.createElement("canvas"); c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        c.toBlob((b) => b ? resolve(b) : reject(new Error("compress")), "image/jpeg", q);
      };
      img.onerror = reject; img.src = reader.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}
async function uploadImage(file) {
  const blob = await compressToBlob(file);
  const path = "img/" + Date.now() + "_" + Math.random().toString(36).slice(2) + ".jpg";
  const { error } = await db.storage.from("media").upload(path, blob, { contentType: "image/jpeg", upsert: false });
  if (error) throw error;
  return db.storage.from("media").getPublicUrl(path).data.publicUrl;

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    const io = new IntersectionObserver((es) => {
      es.forEach((e) => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
    }, { threshold: 0.14 });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  });
}

/* fullscreen lightbox */
function Lightbox({ box, onClose }) {
  useEffect(() => {
    const onKey = (e) => e.key === "Escape" && onClose();
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);
  if (!box) return null;
  return (
    <div className="lb" onClick={onClose}>
      <button className="lbclose" onClick={onClose}><X size={22} /></button>
      <div onClick={(e) => e.stopPropagation()}>
        {box.type === "image" && <img className="full" src={box.src} alt="" />}
        {box.type === "trans" && (
          <div>
            <div className="lb-ba"><BeforeAfter item={box.item} /></div>
            <div className="lb-cap"><b>{box.item.service}</b>{box.item.client ? ` · ${box.item.client}` : ""}{box.item.date ? ` · ${new Date(box.item.date).toLocaleDateString("en-IN")}` : ""}</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* =============================== APP =============================== */
function App() {
  const [data, setData] = useState(null);
  const [view, setView] = useState("site");
  const [session, setSession] = useState(null);
  const [scrolled, setScrolled] = useState(false);
  const [menu, setMenu] = useState(false);

  useEffect(() => {
    loadContent().then(setData);
    db.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = db.auth.onAuthStateChange((_e, s) => setSession(s));
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener("scroll", onScroll);
    return () => { window.removeEventListener("scroll", onScroll); sub.subscription.unsubscribe(); };
  }, []);

  useEffect(() => {
    if (session) fetchAppointments().then((a) => setData((d) => d ? { ...d, appointments: a } : d));
  }, [session]);

  const update = (next) => { setData(next); saveContent(next); };
  const refreshAppts = async () => { const a = await fetchAppointments(); setData((d) => ({ ...d, appointments: a })); };
  if (!data) return <div style={{ minHeight: "100vh", background: "#15110f" }} />;

  return (
    <div className="bm">
      <style>{CSS}</style>
      {view === "site"
        ? <Site data={data} update={update} scrolled={scrolled} menu={menu} setMenu={setMenu}
            goAdmin={() => { setView("admin"); window.scrollTo(0, 0); }} />
        : session
          ? <Admin data={data} update={update} refreshAppts={refreshAppts}
              viewSite={() => { setView("site"); window.scrollTo(0, 0); }}
              logout={async () => { await db.auth.signOut(); setView("site"); window.scrollTo(0, 0); }} />
          : <Login exit={() => setView("site")} />}
      {data.settings.creditsEnabled && <GlowFrameBadge />}
    </div>
  );
}

function BeforeAfter({ item, onExpand }) {

function Booking({ data, update }) {
  const [step, setStep] = useState(0);
  const [f, setF] = useState({ service: data.services[0].name, date: today(0), time: "", name: "", phone: "" });
  const slots = ["10:30", "11:30", "12:30", "14:00", "15:00", "16:00", "17:30", "18:30"];
  const [busy, setBusy] = useState(false);
  const [bookErr, setBookErr] = useState("");
  const submit = async () => {
    const svc = data.services.find((s) => s.name === f.service);
    setBusy(true); setBookErr("");
    const { error } = await db.rpc("create_booking", {
      p_name: f.name, p_phone: f.phone, p_service: f.service,
      p_date: f.date, p_time: f.time, p_price: svc ? svc.price : 0,
    });
    setBusy(false);
    if (error) { setBookErr("Couldn't confirm right now. Please call or WhatsApp us."); return; }
    setStep(1);
  };
  const valid = f.service && f.date && f.time && f.name.trim() && f.phone.trim().length >= 10;

  if (step === 1) return (
    <div className="panel confirm">
      <div className="tick"><Check size={30} /></div>
      <h3 style={{ fontFamily: "Cormorant Garamond", fontSize: 30 }}>Appointment Confirmed</h3>
      <p className="muted" style={{ margin: "10px 0 22px" }}>
        {f.name}, you're booked for <b style={{ color: "var(--gold)" }}>{f.service}</b> on {f.date} at {f.time}. We'll WhatsApp you a reminder.
      </p>
      <button className="btn btn-ghost" onClick={() => { setStep(0); setF({ ...f, time: "", name: "", phone: "" }); }}>Book Another</button>
    </div>
  );

  return (
    <div className="panel">
      <div className="eyebrow" style={{ marginBottom: 18 }}>New Booking</div>
      <div className="field">
        <label>Service</label>
        <select className="select" value={f.service} onChange={(e) => setF({ ...f, service: e.target.value })}>
          {data.services.map((s) => <option key={s.id} value={s.name}>{s.name} — {inr(s.price)}</option>)}
        </select>
      </div>
      <div className="row2">
        <div className="field"><label>Date</label><input className="input" type="date" min={today(0)} value={f.date} onChange={(e) => setF({ ...f, date: e.target.value })} /></div>
        <div className="field"><label>Your Name</label><input className="input" placeholder="Full name" value={f.name} onChange={(e) => setF({ ...f, name: e.target.value })} /></div>
      </div>
      <div className="field"><label>Mobile Number</label><input className="input" placeholder="10-digit number" value={f.phone} onChange={(e) => setF({ ...f, phone: e.target.value.replace(/\D/g, "").slice(0, 10) })} /></div>
      <div className="field">
        <label>Time Slot</label>
        <div className="slots">
          {slots.map((t) => <div key={t} className={`slot ${f.time === t ? "sel" : ""}`} onClick={() => setF({ ...f, time: t })}>{t}</div>)}
        </div>
      </div>
      {bookErr && <div style={{ color: "#e8917e", fontSize: 13, marginBottom: 12 }}>{bookErr}</div>}
      <button className="btn btn-gold" style={{ width: "100%", justifyContent: "center", opacity: (valid && !busy) ? 1 : .5, pointerEvents: (valid && !busy) ? "auto" : "none" }} onClick={submit}>
        {busy ? "Confirming…" : <>Confirm Booking <ArrowRight size={16} /></>}
      </button>
    </div>
  );
}

function StatusTracker() {
  const [phone, setPhone] = useState("");
  const [found, setFound] = useState(undefined);
  const search = async () => {
    const { data } = await db.rpc("get_appointment_status", { p: phone });
    setFound((data && data[0]) ? data[0] : null);
  };
  const order = ["Confirmed", "In Progress", "Completed"];
  return (
    <div className="panel">
      <div className="eyebrow" style={{ marginBottom: 18 }}>Track Appointment</div>
      <p className="muted" style={{ fontSize: 14, marginBottom: 16 }}>Enter the mobile number you booked with to see live status.</p>
      <div className="track-row">
        <input className="input" placeholder="Mobile number" value={phone} onChange={(e) => setPhone(e.target.value.replace(/\D/g, "").slice(0, 10))} />
        <button className="btn btn-gold" onClick={search}>Track</button>
      </div>
      {found === null && <p className="muted" style={{ marginTop: 18 }}>No appointment found for that number. Book one above.</p>}
      {found && (
        <div className="timeline">
          <div style={{ fontFamily: "Cormorant Garamond", fontSize: 23, marginBottom: 6 }}>{found.service}</div>
          <div className="muted" style={{ fontSize: 13, marginBottom: 8 }}>{found.date} · {found.time}</div>
          {found.status === "Rescheduled"
            ? <div className="tl done"><div className="dot" /><div><div className="tt" style={{ color: "var(--gold)" }}>Rescheduled</div></div></div>
            : order.map((s, i) => {
                const done = order.indexOf(found.status) >= i;
                return <div className={`tl ${done ? "done" : ""}`} key={s}><div className="dot" /><div><div className="tt" style={{ color: done ? "var(--gold)" : "var(--soft)" }}>{s}</div></div></div>;
              })}
        </div>
      )}
    </div>
  );
}

function ImageInput({ value, onChange, ratio }) {
  const [busy, setBusy] = useState(false);
  const [upErr, setUpErr] = useState("");
  const pick = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    setBusy(true); setUpErr("");
    try { onChange(await uploadImage(file)); }
    catch { setUpErr("Upload failed — paste an image URL instead, or finish storage setup."); }
    setBusy(false);
  };
  const isUrl = value && value.startsWith("http");
  return (
    <div>
      <div className="img-slot" style={{ aspectRatio: ratio || "4 / 3" }}>
        {value ? <img src={value} alt="" /> : <div className="img-empty"><ImagePlus size={22} /><span>No image yet</span></div>}
      </div>
      <div className="img-actions">
        <label className="mini">{busy ? "Uploading…" : <><ImagePlus size={13} /> Upload</>}<input type="file" accept="image/*" style={{ display: "none" }} disabled={busy} onChange={pick} /></label>
        {value && <button className="mini" onClick={() => onChange("")}><Trash2 size={12} /> Remove</button>}
      </div>
      {upErr && <div style={{ color: "#e8917e", fontSize: 12, marginBottom: 8 }}>{upErr}</div>}
      <input className="input" placeholder="…or paste a hosted image URL" value={isUrl ? value : ""} onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function Dash({ data }) {
  const a = data.appointments;
  const revenue = a.filter((x) => x.status === "Completed").reduce((s, x) => s + (x.price || 0), 0);
  const todayCount = a.filter((x) => x.date === today(0)).length;
  const clients = new Set(a.map((x) => x.phone)).size;
  const popular = Object.entries(a.reduce((m, x) => { m[x.service] = (m[x.service] || 0) + 1; return m; }, {})).sort((p, q) => q[1] - p[1])[0];
  const chart = [...Array(7)].map((_, i) => { const d = today(i - 6); return { day: d.slice(5), count: a.filter((x) => x.date === d).length }; });
  return (
    <>
      <div className="atop"><h2>Dashboard</h2><div className="muted" style={{ fontSize: 13 }}>{new Date().toDateString()}</div></div>
      <div className="kpis">
        <div className="kpi"><div className="l">Total Appointments</div><div className="n">{a.length}</div><div className="d">{todayCount} today</div></div>
        <div className="kpi"><div className="l">Revenue (completed)</div><div className="n" style={{ fontSize: 32 }}>{inr(revenue)}</div><div className="d">across all time</div></div>
        <div className="kpi"><div className="l">Unique Clients</div><div className="n">{clients}</div><div className="d">in records</div></div>
        <div className="kpi"><div className="l">Most Booked</div><div className="n" style={{ fontSize: 22, fontFamily: "Jost", fontWeight: 500 }}>{popular ? popular[0] : "—"}</div><div className="d">{popular ? popular[1] + " bookings" : ""}</div></div>
      </div>
      <div className="card">
        <h3>Appointments — last 7 days</h3>
        <div style={{ height: 220 }}>
          <MiniChart data={chart} />
        </div>
      </div>
    </>
  );
}

function Appts({ data, refreshAppts }) {
  const set = async (id, status) => { const { error } = await db.rpc("set_appointment_status", { p_id: id, p_status: status }); if (error) { alert("Couldn't update status: " + error.message); return; } refreshAppts(); };
  const del = async (id) => { const { error } = await db.rpc("delete_appointment", { p_id: id }); if (error) { alert("Couldn't delete: " + error.message); return; } refreshAppts(); };
  const sorted = [...data.appointments].sort((p, q) => q.createdAt - p.createdAt);
  return (
    <>
      <div className="atop"><h2>Appointments</h2><div className="muted" style={{ fontSize: 13 }}>{sorted.length} total</div></div>
      <div className="card">
        <table className="tbl">
          <thead><tr><th>Client</th><th>Service</th><th>Date / Time</th><th>Value</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {sorted.map((a) => (
              <tr key={a.id}>
                <td><div style={{ color: "var(--ivory)" }}>{a.name}</div><div className="muted" style={{ fontSize: 12 }}>{a.phone}</div></td>
                <td>{a.service}</td>
                <td>{a.date}<div className="muted" style={{ fontSize: 12 }}>{a.time}</div></td>
                <td>{inr(a.price)}</td>
                <td><select className="select" style={{ padding: "7px 10px", fontSize: 12, width: "auto" }} value={a.status} onChange={(e) => set(a.id, e.target.value)}>{STATUSES.map((s) => <option key={s}>{s}</option>)}</select></td>
                <td><button className="mini icon" onClick={() => del(a.id)}><Trash2 size={13} /></button></td>
              </tr>
            ))}
            {sorted.length === 0 && <tr><td colSpan="6" className="muted">No appointments yet. Bookings from the site appear here instantly.</td></tr>}
          </tbody>
        </table>
      </div>
    </>
  );
}

function Transformations({ data, update }) {
  const m = data.media;
  const list = m.transformations;
  const setT = (id, k, v) => update({ ...data, media: { ...m, transformations: list.map((x) => x.id === id ? { ...x, [k]: v } : x) } });
  const add = () => update({ ...data, media: { ...m, transformations: [...list, { id: Date.now(), client: "", service: "New Transformation", date: today(0), desc: "", featured: false, before: "", after: "" }] } });
  const del = (id) => update({ ...data, media: { ...m, transformations: list.filter((x) => x.id !== id) } });
  const reorder = (i, dir) => update({ ...data, media: { ...m, transformations: move(list, i, dir) } });
  return (
    <>
      <div className="atop"><h2>Transformation Gallery</h2><button className="btn btn-gold" style={{ padding: "11px 18px" }} onClick={add}><Plus size={15} /> Add Transformation</button></div>

        <div className="card" key={item.id}>
          <div className="eh">

            <div className="ord">
              <button className="mini icon" disabled={i === 0} onClick={() => reorder(i, -1)}><ChevronUp size={14} /></button>
              <button className="mini icon" disabled={i === list.length - 1} onClick={() => reorder(i, 1)}><ChevronDown size={14} /></button>

          </div>
          <div className="row3">
            <div className="field"><label>Client name</label><input className="input" value={item.client} onChange={(e) => setT(item.id, "client", e.target.value)} /></div>
            <div className="field"><label>Service performed</label><input className="input" value={item.service} onChange={(e) => setT(item.id, "service", e.target.value)} /></div>

          <div className="ba-edit">
            <div><label className="field" style={{ display: "block", marginBottom: 6 }}>Before image</label><ImageInput ratio="3 / 4" value={item.before} onChange={(v) => setT(item.id, "before", v)} /></div>

          </label>
        </div>
      ))}

              <div style={{ fontFamily: "Cormorant Garamond", fontSize: 20 }}>{t.name || "Member"}</div>
              <div className="ord">
                <button className="mini icon" disabled={i === 0} onClick={() => moveTeam(i, -1)}><ChevronUp size={14} /></button>
                <button className="mini icon" disabled={i === m.team.length - 1} onClick={() => moveTeam(i, 1)}><ChevronDown size={14} /></button>
                <button className="mini icon" onClick={() => delTeam(t.id)}><Trash2 size={13} /></button>
              </div>
            </div>
            <div className="row2">
              <div className="field"><label>Name</label><input className="input" value={t.name} onChange={(e) => setTeam(t.id, "name", e.target.value)} /></div>
              <div className="field"><label>Role</label><input className="input" value={t.role} onChange={(e) => setTeam(t.id, "role", e.target.value)} /></div>
            </div>
            <div className="field"><label>Photo</label><ImageInput ratio="1 / 1" value={t.img} onChange={(v) => setTeam(t.id, "img", v)} /></div>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="eh"><h3 style={{ margin: 0 }}>Product Showcase</h3><button className="mini" onClick={addProd}><Plus size={13} /> Add product</button></div>
        <p className="muted" style={{ fontSize: 13, marginBottom: 6 }}>The Products section appears on the site only when at least one product is added.</p>
        {m.products.map((p, i) => (
          <div className="editrow" key={p.id}>
            <div className="eh">
              <div style={{ fontFamily: "Cormorant Garamond", fontSize: 20 }}>{p.name || "Product"}</div>
              <div className="ord">
                <button className="mini icon" disabled={i === 0} onClick={() => moveProd(i, -1)}><ChevronUp size={14} /></button>
                <button className="mini icon" disabled={i === m.products.length - 1} onClick={() => moveProd(i, 1)}><ChevronDown size={14} /></button>
                <button className="mini icon" onClick={() => delProd(p.id)}><Trash2 size={13} /></button>
              </div>
            </div>
            <div className="row2">
              <div className="field"><label>Name</label><input className="input" value={p.name} onChange={(e) => setProd(p.id, "name", e.target.value)} /></div>
              <div className="field"><label>Price (optional, e.g. ₹1,200)</label><input className="input" value={p.price} onChange={(e) => setProd(p.id, "price", e.target.value)} /></div>
            </div>
            <div className="field"><label>Image</label><ImageInput ratio="1 / 1" value={p.img} onChange={(v) => setProd(p.id, "img", v)} /></div>
          </div>
        ))}
      </div>

      <div className="card">
        <h3>Testimonial Photos</h3>
        <p className="muted" style={{ fontSize: 13, marginBottom: 16 }}>Optional client photo shown next to each review.</p>
        <div className="row2">
          {data.reviews.map((r) => (
            <div key={r.id} className="field"><label>{r.name} · {r.service}</label><ImageInput ratio="1 / 1" value={r.img} onChange={(v) => setRevImg(r.id, v)} /></div>
          ))}
        </div>
      </div>

      <div className="card">
        <h3>Gallery / Studio Images</h3>
        <div className="gal-manage">
          {m.gallery.map((src, i) => (
            <div className="gal-tile" key={i}>
              <img src={src} alt="" />
              <div className="ctrls">
                <div style={{ display: "flex", gap: 4 }}>
                  <div className="gb" onClick={() => moveGal(i, -1)}><ChevronUp size={14} /></div>
                  <div className="gb" onClick={() => moveGal(i, 1)}><ChevronDown size={14} /></div>
                </div>
                <div className="gb" onClick={() => delGal(i)}><X size={14} /></div>
              </div>
            </div>
          ))}
          <label className="gal-add"><ImagePlus size={22} /><span style={{ fontSize: 12 }}>Add image</span><input type="file" accept="image/*" style={{ display: "none" }} onChange={addGal} /></label>
        </div>
        <div className="field" style={{ marginTop: 14 }}>
          <label>Or add by URL</label>
          <UrlAdder onAdd={addGalUrl} />
        </div>
      </div>
    </>
  );
}

function UrlAdder({ onAdd }) {
  const [u, setU] = useState("");
  return (
    <div className="track-row">
      <input className="input" placeholder="https://image-url.jpg" value={u} onChange={(e) => setU(e.target.value)} />
      <button className="btn btn-gold" onClick={() => { onAdd(u.trim()); setU(""); }}>Add</button>
    </div>
  );
}

function Svc({ data, update }) {
  const edit = (id, field, val) => update({ ...data, services: data.services.map((s) => s.id === id ? { ...s, [field]: field === "price" ? +val || 0 : val } : s) });
  const del = (id) => update({ ...data, services: data.services.filter((s) => s.id !== id) });
  const add = () => update({ ...data, services: [...data.services, { id: Date.now(), name: "New Service", cat: "Hair", price: 1000, desc: "Describe this service.", img: "" }] });
  return (
    <>
      <div className="atop"><h2>Services &amp; Prices</h2><button className="btn btn-gold" style={{ padding: "11px 18px" }} onClick={add}><Plus size={15} /> Add Service</button></div>
      <div className="card">
        <table className="tbl">
          <thead><tr><th>Service</th><th>Category</th><th>Price (₹)</th><th></th></tr></thead>
          <tbody>
            {data.services.map((s) => (
              <tr key={s.id}>
                <td style={{ width: "50%" }}><input className="input" value={s.name} onChange={(e) => edit(s.id, "name", e.target.value)} /></td>
                <td><input className="input" value={s.cat} onChange={(e) => edit(s.id, "cat", e.target.value)} /></td>
                <td style={{ width: 130 }}><input className="input" type="number" value={s.price} onChange={(e) => edit(s.id, "price", e.target.value)} /></td>
                <td><button className="mini icon" onClick={() => del(s.id)}><Trash2 size={13} /></button></td>
              </tr>
            ))}
          </tbody>
        </table>
        <p className="muted" style={{ fontSize: 12.5, marginTop: 14 }}>Tip: add a photo to any service under <b style={{ color: "var(--soft)" }}>Images &amp; Content → Service Images</b>.</p>
      </div>
    </>
  );
}

function Logs({ data, update }) {
  const [date, setDate] = useState(today(0));
  const [note, setNote] = useState("");
  const addNote = () => { if (!note.trim()) return; update({ ...data, logs: [{ id: Date.now(), date, note: note.trim() }, ...data.logs] }); setNote(""); };
  const delNote = (id) => update({ ...data, logs: data.logs.filter((l) => l.id !== id) });
  const dates = Array.from(new Set([...data.appointments.map((a) => a.date), ...data.logs.map((l) => l.date)])).sort((a, b) => b.localeCompare(a));
  return (
    <>
      <div className="atop"><h2>Daily Logs</h2><div className="muted" style={{ fontSize: 13 }}>Date-wise activity &amp; notes</div></div>
      <div className="card">
        <h3>Add a note</h3>
        <div className="row2">
          <div className="field"><label>Date</label><input className="input" type="date" value={date} onChange={(e) => setDate(e.target.value)} /></div>
          <div className="field"><label>Note</label><input className="input" placeholder="e.g. 2 walk-ins, restocked colour" value={note} onChange={(e) => setNote(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addNote()} /></div>
        </div>
        <button className="btn btn-gold" style={{ padding: "11px 20px" }} onClick={addNote}><Plus size={15} /> Add Note</button>
      </div>
      {dates.length === 0 && <div className="card muted">No activity logged yet.</div>}
      {dates.map((d) => {
        const appts = data.appointments.filter((a) => a.date === d);
        const rev = appts.reduce((s, a) => s + (a.price || 0), 0);
        const notes = data.logs.filter((l) => l.date === d);
        return (
          <div className="card" key={d}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
              <h3 style={{ margin: 0 }}>{new Date(d).toDateString()}</h3>
              <div className="muted" style={{ fontSize: 13 }}>{appts.length} appts · {inr(rev)} booked</div>
            </div>
            {appts.length > 0 && (
              <table className="tbl"><tbody>
                {appts.map((a) => <tr key={a.id}><td>{a.time}</td><td>{a.name}</td><td>{a.service}</td><td><span className={`pill ${a.status.replace(/\s/g, "")}`}>{a.status}</span></td><td style={{ textAlign: "right" }}>{inr(a.price)}</td></tr>)}
              </tbody></table>
            )}
            {notes.map((n) => (
              <div key={n.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderTop: "1px solid rgba(224,193,136,.08)" }}>
                <div style={{ fontSize: 14 }}><NotebookPen size={13} style={{ color: "var(--gold)", marginRight: 8, verticalAlign: "middle" }} />{n.note}</div>
                <button className="mini icon" onClick={() => delNote(n.id)}><Trash2 size={12} /></button>
              </div>
            ))}
          </div>
        );
      })}
    </>
  );
}

function Clients({ data }) {
  const [q, setQ] = useState("");
  const map = {};
  data.appointments.forEach((a) => {
    if (!map[a.phone]) map[a.phone] = { name: a.name, phone: a.phone, visits: 0, spend: 0, last: a.date };
    map[a.phone].visits++; map[a.phone].spend += a.price || 0;
    if (a.date > map[a.phone].last) map[a.phone].last = a.date;
  });
  const list = Object.values(map).filter((cl) => (cl.name + cl.phone).toLowerCase().includes(q.toLowerCase())).sort((p, r) => r.spend - p.spend);
  return (
    <>
      <div className="atop"><h2>Clients</h2><input className="input" style={{ width: 240 }} placeholder="Search name or number" value={q} onChange={(e) => setQ(e.target.value)} /></div>
      <div className="card">
        <table className="tbl">
          <thead><tr><th>Name</th><th>Mobile</th><th>Visits</th><th>Total Spend</th><th>Last Visit</th></tr></thead>
          <tbody>
            {list.map((cl) => <tr key={cl.phone}><td>{cl.name}</td><td>{cl.phone}</td><td>{cl.visits}</td><td>{inr(cl.spend)}</td><td>{cl.last}</td></tr>)}
            {list.length === 0 && <tr><td colSpan="5" className="muted">No clients match.</td></tr>}
          </tbody>
        </table>
      </div>
    </>
  );
}

function SettingsTab({ data, update }) {
  const [s, setS] = useState(data.settings);
  const [np, setNp] = useState("");
  const [pwMsg, setPwMsg] = useState("");
  const [saved, setSaved] = useState(false);
  const save = () => { update({ ...data, settings: s }); setSaved(true); setTimeout(() => setSaved(false), 1800); };
  const toggleCredits = () => { const next = { ...s, creditsEnabled: !s.creditsEnabled }; setS(next); update({ ...data, settings: { ...data.settings, creditsEnabled: next.creditsEnabled } }); };
  const F = (label, key) => (<div className="field"><label>{label}</label><input className="input" value={s[key]} onChange={(e) => setS({ ...s, [key]: e.target.value })} /></div>);
  return (
    <>
      <div className="atop"><h2>Business Settings</h2>{saved && <div style={{ color: "var(--gold)", fontSize: 13 }}><Check size={14} style={{ verticalAlign: "middle" }} /> Saved</div>}</div>
      <div className="card">
        <h3>Business Information</h3>
        <div className="row2">{F("Business Name", "businessName")}{F("Tagline", "tagline")}</div>
        <div className="row2">{F("Phone", "phone")}{F("WhatsApp", "whatsapp")}</div>
        {F("Address", "address")}
        <div className="row2">{F("Hours (open)", "hoursWeek")}{F("Hours (closed)", "hoursOff")}</div>
        {F("Google Maps Link", "mapsLink")}
      </div>
      <div className="card">
        <h3>Website Credits</h3>
        <p className="muted" style={{ fontSize: 13, marginBottom: 14 }}>Show the "Made by GlowFrame" badge in the bottom-right corner of the website.</p>
        <label className="toggle" onClick={toggleCredits}>
          <span className={`toggle ${s.creditsEnabled ? "on" : ""}`}><span className="tg" /></span>
          <span style={{ fontSize: 14, color: "var(--ivory)" }}>{s.creditsEnabled ? "Badge is visible" : "Badge is hidden"}</span>
        </label>
      </div>
      <div className="card">
        <h3>Owner Password</h3>
        <p className="muted" style={{ fontSize: 13, marginBottom: 14 }}>Change the password for the owner login.</p>
        <div className="field" style={{ maxWidth: 320 }}><label>New Password</label><input className="input" type="password" placeholder="At least 6 characters" value={np} onChange={(e) => setNp(e.target.value)} /></div>
        <button className="mini" onClick={async () => { if (np.trim().length < 6) { setPwMsg("Use at least 6 characters."); return; } const { error } = await db.auth.updateUser({ password: np.trim() }); setPwMsg(error ? "Couldn't update password." : "Password updated."); setNp(""); }}>Update password</button>
        {pwMsg && <div style={{ color: "var(--gold)", fontSize: 13, marginTop: 10 }}>{pwMsg}</div>}
      </div>
      <button className="btn btn-gold" onClick={save}>Save Changes</button>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
